<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Localsenger v1.9</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="light-theme" id="appBody">
    <div class="app-container">
        <aside class="sidebar">
            <header class="sidebar-header">
                <div class="profile-img-container">
                    <img src="https://via.placeholder.com/40" id="userAvatar" class="profile-img" alt="Profil">
                    <input type="file" id="avatarInput" style="display:none;" accept="image/*">
                </div>
                <div class="header-brand" id="userName">Chargement...</div>
                <div class="header-actions">
                    <button id="themeBtn" title="Changer le thème">🌙</button>
                    <button id="exportBtn" title="Archive visuelle">📂</button>
                    <button id="clearBtn" title="Vider l'historique">🗑️</button>
                </div>
            </header>
            
            <div class="search-bar">
                <input type="text" id="searchMessages" placeholder="Rechercher un message...">
            </div>

            <div class="contacts-list">
                <div class="contact-item active">
                    <div class="contact-avatar"></div>
                    <div class="contact-info">
                        <div class="contact-top"><h4>Mon Journal Local</h4></div>
                        <p>Version 1.9 : Dark Mode</p>
                    </div>
                </div>
            </div>
        </aside>

        <main class="chat-window">
            <header class="chat-header">
                <div class="contact-details">
                    <div class="contact-avatar small"></div>
                    <div class="contact-text">
                        <span class="contact-name">Mon Journal Local</span>
                        <span class="contact-status">Paramètres sauvegardés</span>
                    </div>
                </div>
            </header>

            <div class="message-container" id="chatBox"></div>

            <footer class="chat-footer">
                <button id="attachBtn" title="Envoyer une image">📎</button>
                <input type="file" id="imageInput" style="display:none;" accept="image/*">
                <input type="text" id="messageInput" placeholder="Tapez un message">
                <button id="sendBtn">Envoyer</button>
            </footer>
        </main>
    </div>

    <div id="loginModal" class="modal">
        <div class="modal-content">
            <h3>Bienvenue</h3>
            <input type="text" id="pseudoInput" placeholder="Ton pseudo...">
            <button id="savePseudoBtn">Commencer</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
