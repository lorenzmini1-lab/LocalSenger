<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Localsenger v1.5</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <header class="sidebar-header">
                <div class="profile-img" id="userAvatar"></div>
                <div class="header-brand" id="userName">Chargement...</div>
                <button id="exportBtn" title="Exporter l'archive visuelle" style="background:none; border:none; cursor:pointer; font-size:1.2rem;">📂</button>
            </header>
            <div class="search-bar">
                <input type="text" placeholder="Rechercher ou démarrer une discussion">
            </div>
            <div class="contacts-list" id="contactsList">
                <div class="contact-item active">
                    <div class="contact-avatar"></div>
                    <div class="contact-info">
                        <h4>Contact Local</h4>
                        <p>Exportation visuelle prête</p>
                    </div>
                </div>
            </div>
        </aside>

        <main class="chat-window">
            <header class="chat-header">
                <div class="contact-details">
                    <div class="contact-avatar small"></div>
                    <div class="contact-text">
                        <span class="contact-name">Contact Local</span>
                        <span class="contact-status">v1.5 - Archiveur</span>
                    </div>
                </div>
            </header>

            <div class="message-container" id="chatBox"></div>

            <footer class="chat-footer">
                <input type="text" id="messageInput" placeholder="Tapez un message">
                <button id="sendBtn">Envoyer</button>
            </footer>
        </main>
    </div>

    <div id="loginModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:100; justify-content:center; align-items:center; color:white;">
        <div style="background:#222; padding:30px; border-radius:15px; text-align:center; box-shadow: 0 4px 15px rgba(0,0,0,0.5);">
            <h3 style="color:#00a884; margin-bottom:15px;">Bienvenue sur Localsenger</h3>
            <p>Choisis un pseudonyme pour commencer :</p>
            <input type="text" id="pseudoInput" style="padding:12px; margin:20px 0; border-radius:8px; border:none; width:80%; outline:none;">
            <br>
            <button id="savePseudoBtn" style="background:#00a884; color:white; border:none; padding:12px 25px; border-radius:8px; cursor:pointer; font-weight:bold;">Créer mon compte local</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
